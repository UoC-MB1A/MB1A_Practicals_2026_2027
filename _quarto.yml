# This is the website configuration file 
# For training developers:
#  Please do not edit this file
#  Contact us if something doesn't look right on your rendered website

project:
  type: book
  output-dir: _site
  render:
    - index.md
    - setup.qmd
    - materials.md
    - materials/*
    - "!materials/*/no_render"

format:
  html:
    theme: [default, my-theme/theme.scss]
    toc: true
    number-sections: false
    number-depth: 3
    code-link: true
    code-copy: true
    lightbox: true
    crossrefs:
      hover: false

filters:
  - callout-exercise

exercises:
  number: true
  hide-answers: false

execute:
  freeze: auto

knitr:
  opts_knit:
    cache.path: .knitr_cache

metadata-files:
  - "materials/_chapters.yml"

book:
  favicon: "my-theme/university-of-cambridge-favicon.ico"
  page-footer: 
    center: |
      Licensed [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/) 
      ![](https://creativecommons.org/images/deed/cc_icon_black_x2.png){width=25px} 
  search:
    location: sidebar
  bread-crumbs: false
  page-navigation: true
  navbar:
    pinned: true
    title: "MB1A Practicals 2026-2027"
    logo: "my-theme/university_crest_reversed.png"
  chapters:
    - part: "Welcome"
      chapters: 
        - text: "Overview"
          href: index.md
        - text: "Installing R and RStudio"
          href: setup.qmd
  appendices: 
    - href: versions.md

metadata:
  course-title: MB1A
  intake: "2026_2027"
  git_org: "UoC-MB1A"
  git_repo: "MB1A_Students_2026_2027"